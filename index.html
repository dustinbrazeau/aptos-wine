<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#241328" />
<title>Aptos 2026 · Blind Wine Tasting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#241328; --plum-2:#1a0e1f; --bordeaux:#36182a; --bordeaux-2:#451d33;
    --garnet:#9b2f4a; --garnet-bright:#c24a66; --gold:#e8b04b; --gold-soft:#f0c876;
    --teal:#4f9a93; --sand:#f4ede2; --sand-dim:#cdbfb8;
    --line:rgba(244,237,226,.12); --line-strong:rgba(244,237,226,.22);
    --shadow:0 18px 40px -18px rgba(0,0,0,.7); --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Outfit',system-ui,sans-serif;color:var(--sand);
    background:
      radial-gradient(120% 80% at 50% -10%, #3a1c34 0%, transparent 55%),
      radial-gradient(100% 70% at 50% 110%, #2b1640 0%, transparent 60%),
      linear-gradient(180deg,var(--plum) 0%, var(--plum-2) 100%);
    background-attachment:fixed;min-height:100dvh;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  /* Hero photo on the setup screen */
  body.setup-bg::before{
    content:'';position:fixed;inset:0;z-index:-2;
    background:var(--hero) center 28% / cover no-repeat;
  }
  body.setup-bg::after{
    content:'';position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(20,8,24,.12) 0%, rgba(20,8,24,.40) 42%, rgba(26,14,31,.93) 100%);
  }
  body.setup-bg .mast h1, body.setup-bg .mast .sub, body.setup-bg .eyebrow{text-shadow:0 2px 22px rgba(0,0,0,.6);}
  body.setup-bg .mast{padding-top:38px;}

  /* ---------- Opening title / splash screen ---------- */
  body.title-mode::before{
    content:'';position:fixed;inset:0;z-index:-2;
    background:var(--hero) center / cover no-repeat;
    filter:blur(24px) brightness(.46) saturate(1.15);transform:scale(1.18);
  }
  .title-screen{
    min-height:100dvh;display:flex;flex-direction:column;text-align:center;
    padding:max(26px,env(safe-area-inset-top)) 2px calc(26px + env(safe-area-inset-bottom));gap:16px;
  }
  .title-head{flex:none;}
  .title-head .eyebrow{text-shadow:0 2px 18px rgba(0,0,0,.7);}
  .title-head h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(40px,12vw,62px);
    line-height:1;margin:10px 0 0;letter-spacing:-.01em;text-shadow:0 3px 26px rgba(0,0,0,.6);
  }
  .title-head h1 .yr{color:var(--gold);font-style:italic;font-weight:500;}
  .title-head .title-sub{
    font-family:'Fraunces',serif;font-style:italic;font-size:clamp(20px,6vw,28px);
    color:var(--sand);margin-top:2px;letter-spacing:.04em;text-shadow:0 2px 20px rgba(0,0,0,.65);
  }
  .title-photo{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:4px 0;}
  .title-photo img{
    max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
    border-radius:16px;box-shadow:0 26px 54px -16px rgba(0,0,0,.8);
    border:1px solid rgba(244,237,226,.18);
  }
  .title-foot{flex:none;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .title-start{max-width:320px;width:100%;font-size:17px;padding:16px 18px;}
  .title-tag{font-size:12px;color:#e8d9cb;letter-spacing:.04em;text-shadow:0 1px 10px rgba(0,0,0,.7);}
  .version{font-size:11px;color:rgba(244,237,226,.6);letter-spacing:.08em;margin-top:2px;text-shadow:0 1px 8px rgba(0,0,0,.7);}

  .wrap{max-width:560px;margin:0 auto;padding:0 18px calc(40px + env(safe-area-inset-bottom));}

  header.mast{text-align:center;padding:26px 0 14px;}
  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .eyebrow .dot{color:var(--teal);margin:0 7px;}
  .mast h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(34px,9vw,46px);line-height:1.02;margin:8px 0 4px;letter-spacing:-.01em;}
  .mast h1 .yr{color:var(--gold);font-style:italic;font-weight:500;}
  .mast .sub{font-size:13.5px;color:var(--sand-dim);letter-spacing:.02em;}
  body.setup-bg .mast .sub{color:#eaddd0;}
  .mast .who{margin-top:12px;display:inline-block;font-size:12.5px;color:var(--sand);background:var(--bordeaux);border:1px solid var(--line);padding:5px 14px;border-radius:999px;}
  .mast .who b{color:var(--gold-soft);font-weight:600;}

  .rail{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin:18px 0 22px;}
  .pip{width:26px;height:6px;border-radius:999px;background:rgba(244,237,226,.14);transition:background .25s,transform .25s;}
  .pip.done{background:var(--garnet-bright);}
  .pip.now{background:var(--gold);transform:scaleY(1.5);}

  .card{background:linear-gradient(180deg,var(--bordeaux) 0%, var(--bordeaux-2) 140%);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 20px;margin-bottom:16px;}
  .card.flush{padding-top:18px;}
  .glass-card{background:rgba(40,21,46,.66);backdrop-filter:blur(16px) saturate(1.1);-webkit-backdrop-filter:blur(16px) saturate(1.1);border-color:rgba(244,237,226,.2);}
  .card-tag{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:3px;}
  .card h2{font-family:'Fraunces',serif;font-weight:600;font-size:25px;margin:0 0 2px;letter-spacing:-.01em;}
  .card .lede{color:var(--sand-dim);font-size:13.5px;margin:0 0 6px;}
  .glass-card .lede{color:#d9cabf;}

  label.fld{display:block;margin:18px 0 0;}
  label.fld .lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--sand-dim);font-weight:600;}
  input[type=text],input[type=number]{width:100%;margin-top:7px;background:var(--plum-2);border:1px solid var(--line-strong);color:var(--sand);font:500 16px 'Outfit',sans-serif;padding:13px 14px;border-radius:12px;transition:border-color .15s,box-shadow .15s;}
  input::placeholder{color:#8a7a82;}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,176,75,.18);}

  .stepper{display:flex;align-items:center;gap:14px;margin-top:10px;}
  .stepper button{width:52px;height:52px;border-radius:14px;border:1px solid var(--line-strong);background:var(--plum-2);color:var(--gold);font-size:26px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,background .15s;}
  .stepper button:active{transform:scale(.92);}
  .stepper button:disabled{opacity:.3;cursor:not-allowed;}
  .stepper .count{font-family:'Fraunces',serif;font-size:46px;font-weight:600;color:var(--sand);min-width:64px;text-align:center;}
  .stepper .count small{display:block;font-family:'Outfit';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-dim);font-weight:600;margin-top:-4px;}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font:600 16px 'Outfit',sans-serif;letter-spacing:.01em;padding:15px 18px;border-radius:14px;border:none;cursor:pointer;transition:transform .1s,filter .15s,background .15s;}
  .btn:active{transform:translateY(1px) scale(.995);}
  .btn-primary{background:linear-gradient(180deg,var(--garnet-bright),var(--garnet));color:#fff;box-shadow:0 10px 22px -10px rgba(155,47,74,.9);}
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-gold{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2410;box-shadow:0 10px 22px -10px rgba(232,176,75,.7);}
  .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--sand);}
  .btn-ghost:hover{background:rgba(244,237,226,.05);}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn-row .btn{flex:1;}
  .stack{display:flex;flex-direction:column;gap:10px;}

  .rate-row{padding:13px 0;border-top:1px solid var(--line);}
  .rate-row:first-child{border-top:none;}
  .rate-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
  .rate-name{font-weight:600;font-size:15.5px;}
  .rate-name .hint{display:block;font-weight:400;font-size:11.5px;color:var(--sand-dim);}
  .rate-val{font-family:'Fraunces',serif;font-size:18px;color:var(--gold);min-width:34px;text-align:right;}
  .rate-val.empty{color:#6f5f67;}
  .dots{display:flex;gap:8px;}
  .dot-btn{flex:1;height:42px;border-radius:11px;border:1px solid var(--line-strong);background:var(--plum-2);color:var(--sand-dim);font-weight:600;font-size:15px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;}
  .dot-btn.on{background:linear-gradient(180deg,#b8395a,#7e2540);color:#fff;border-color:transparent;box-shadow:inset 0 1px 0 rgba(255,255,255,.18);}
  .dot-btn:active{transform:scale(.93);}

  .total-block{display:flex;align-items:center;gap:18px;margin-top:18px;padding:16px;border-radius:14px;background:var(--plum-2);border:1px solid var(--line);}
  .glass{width:62px;height:92px;flex:none;}
  .total-meta{flex:1;}
  .total-meta .k{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sand-dim);font-weight:600;}
  .total-meta .v{font-family:'Fraunces',serif;font-size:38px;line-height:1;color:var(--gold);}
  .total-meta .v small{font-family:'Outfit';font-size:15px;color:var(--sand-dim);font-weight:500;}

  .guess-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .guess-grid label.fld{margin-top:0;}
  .with-prefix{position:relative;}
  .with-prefix span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-weight:600;pointer-events:none;}
  .with-prefix input{padding-left:26px;}

  .grade-block{padding:15px 0;border-top:1px solid var(--line);}
  .grade-block:first-of-type{border-top:none;}
  .grade-q{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px;}
  .grade-q .qn{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--sand-dim);font-weight:600;}
  .grade-q .pts{font-family:'Fraunces',serif;color:var(--gold);font-size:16px;}
  .grade-guess{font-size:16px;font-weight:600;margin-bottom:10px;}
  .grade-guess .blank{color:#6f5f67;font-weight:400;font-style:italic;}
  .grade-guess em{font-style:normal;color:var(--sand-dim);font-weight:400;}
  .opts{display:flex;gap:7px;flex-wrap:wrap;}
  .opt{flex:1 1 auto;min-width:62px;padding:9px 6px;border-radius:10px;border:1px solid var(--line-strong);background:var(--plum-2);color:var(--sand-dim);font-weight:600;font-size:12.5px;cursor:pointer;transition:all .12s;text-align:center;line-height:1.15;}
  .opt b{display:block;font-family:'Fraunces',serif;font-size:14px;color:inherit;}
  .opt.on{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2410;border-color:transparent;}
  .opt:active{transform:scale(.95);}
  .price-note{margin-top:9px;font-size:12.5px;color:var(--sand-dim);}
  .price-note b{color:var(--gold-soft);}
  .price-legend{font-size:11px;color:#8a7a82;margin-top:3px;letter-spacing:.02em;}

  .scorebig{text-align:center;padding:6px 0 4px;}
  .scorebig .pct{font-family:'Fraunces',serif;font-size:72px;line-height:.9;color:var(--gold);font-weight:600;}
  .scorebig .pct small{font-size:26px;color:var(--sand-dim);}
  .scorebig .title{font-family:'Fraunces',serif;font-style:italic;font-size:24px;margin-top:6px;}
  .scorebig .raw{color:var(--sand-dim);font-size:13.5px;margin-top:4px;}
  .meter{height:10px;border-radius:999px;background:var(--plum-2);overflow:hidden;margin:16px 0 2px;border:1px solid var(--line);}
  .meter i{display:block;height:100%;background:linear-gradient(90deg,var(--garnet),var(--gold));border-radius:999px;transition:width .8s ease;}

  .rank{display:flex;align-items:center;gap:14px;padding:13px 0;border-top:1px solid var(--line);}
  .rank:first-of-type{border-top:none;}
  .rank .medal{font-size:24px;width:30px;text-align:center;flex:none;}
  .rank .rname{flex:1;font-weight:600;font-size:16px;}
  .rank .rname small{display:block;color:var(--sand-dim);font-weight:400;font-size:12px;}
  .rank .rscore{font-family:'Fraunces',serif;font-size:22px;color:var(--gold);}
  .rank .rscore small{font-family:'Outfit';font-size:12px;color:var(--sand-dim);}
  .rank.gold{background:linear-gradient(90deg,rgba(232,176,75,.12),transparent);border-radius:12px;padding-left:10px;margin-left:-10px;border-top-color:transparent;}
  .rank .rx{background:none;border:none;color:#8a7a82;font-size:18px;cursor:pointer;padding:4px 6px;}
  .rank .rx:hover{color:var(--garnet-bright);}

  .mini-note{font-size:12.5px;color:var(--sand-dim);text-align:center;margin-top:4px;}
  .footer-note{text-align:center;color:#8a7a82;font-size:11.5px;margin-top:26px;letter-spacing:.02em;}
  .reset-link{display:block;text-align:center;margin-top:14px;color:#8a7a82;font-size:12.5px;background:none;border:none;cursor:pointer;width:100%;text-decoration:underline;text-underline-offset:3px;}
  .reset-link:hover{color:var(--garnet-bright);}

  /* QR + scanner */
  .qr-wrap{text-align:center;padding:8px 0;}
  .qr-frame{display:inline-block;padding:14px;background:#fff;border-radius:16px;box-shadow:var(--shadow);}
  .qr-frame img{display:block;width:min(80vw,340px);height:auto;image-rendering:pixelated;}
  .qr-sum{margin-top:16px;font-size:14px;color:var(--sand-dim);}
  .qr-sum b{color:var(--gold-soft);font-size:17px;}

  .cam{position:relative;width:100%;aspect-ratio:1/1;border-radius:16px;overflow:hidden;background:#000;border:1px solid var(--line-strong);}
  .cam video{width:100%;height:100%;object-fit:cover;display:block;}
  .cam .frameguide{position:absolute;inset:16%;border:2px solid rgba(232,176,75,.85);border-radius:14px;box-shadow:0 0 0 100vmax rgba(0,0,0,.25);}
  .cam .startover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:linear-gradient(180deg,#2a1530,#160a1c);color:var(--sand);text-align:center;padding:20px;}
  .cam .startover .cam-ico{font-size:34px;}
  .cam .startover button{margin-top:6px;}
  .scan-status{text-align:center;font-size:13px;color:var(--teal);margin:10px 0 2px;font-weight:600;min-height:18px;}
  .tally{margin-top:6px;}
  .tally-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);}
  .tally-row:first-child{border-top:none;}
  .tally-row .medal{font-size:20px;width:26px;text-align:center;flex:none;}
  .tally-row .nm{flex:1;font-weight:600;font-size:15px;}
  .tally-row .nm small{display:block;color:var(--sand-dim);font-weight:400;font-size:11.5px;}
  .tally-row .pc{font-family:'Fraunces',serif;font-size:20px;color:var(--gold);}
  .tally-empty{text-align:center;color:#8a7a82;font-size:13px;padding:18px 0;}
  .manual-add{display:flex;gap:8px;margin-top:14px;align-items:flex-end;flex-wrap:wrap;}
  .manual-add label{flex:1;min-width:90px;}
  .manual-add input{margin-top:5px;padding:10px 12px;font-size:15px;}
  .manual-add .lbl{font-size:10.5px;}

  /* Final results: champion + awards */
  .champ{display:flex;align-items:center;gap:16px;margin-top:6px;padding:16px;border-radius:14px;
    background:linear-gradient(100deg,rgba(232,176,75,.20),rgba(232,176,75,.04));border:1px solid rgba(232,176,75,.42);}
  .champ-ico{font-size:42px;flex:none;}
  .champ-k{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .champ-n{font-family:'Fraunces',serif;font-size:27px;line-height:1.05;margin:1px 0;}
  .champ-s{font-size:13px;color:var(--sand-dim);}
  .awards{margin-top:2px;}
  .award{display:flex;align-items:center;gap:14px;padding:12px 0;border-top:1px solid var(--line);}
  .award:first-child{border-top:none;}
  .aw-ico{font-size:24px;width:30px;text-align:center;flex:none;}
  .aw-meta{flex:1;}
  .aw-label{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--sand-dim);font-weight:600;}
  .aw-win{font-weight:600;font-size:16px;margin-top:1px;}
  .aw-win small{color:var(--gold);font-family:'Fraunces',serif;font-weight:500;margin-left:4px;}
  .aw-win.muted{color:#8a7a82;font-weight:400;font-style:italic;font-size:13.5px;}

  /* Expandable per-player results */
  .presult{border-top:1px solid var(--line);}
  .presult:first-child{border-top:none;}
  .presult-head{display:flex;align-items:center;gap:14px;width:100%;background:none;border:none;
    color:var(--sand);cursor:pointer;padding:13px 0;text-align:left;font-family:inherit;}
  .presult-head .medal{font-size:24px;width:30px;text-align:center;flex:none;}
  .presult-head .rname{flex:1;font-weight:600;font-size:16px;}
  .presult-head .rname small{display:block;color:var(--sand-dim);font-weight:400;font-size:12px;}
  .presult-head .rscore{font-family:'Fraunces',serif;font-size:22px;color:var(--gold);}
  .presult-head .rscore small{font-family:'Outfit';font-size:12px;color:var(--sand-dim);}
  .chev{color:var(--sand-dim);font-size:13px;width:16px;text-align:center;transition:transform .2s;flex:none;}
  .chev.open{transform:rotate(180deg);color:var(--gold);}
  .presult-detail{padding:4px 0 14px 44px;}
  .pd-row{display:flex;gap:10px;align-items:baseline;padding:5px 0;font-size:13.5px;}
  .pd-w{color:var(--teal);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase;min-width:52px;flex:none;}
  .pd-g{flex:1;color:var(--sand);}
  .pd-p{color:var(--gold);font-family:'Fraunces',serif;font-size:14px;flex:none;}
  .pd-empty{color:#8a7a82;font-size:13px;font-style:italic;padding:4px 0;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--bordeaux-2);border:1px solid var(--line-strong);color:var(--sand);padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .3s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  @media (max-width:380px){.guess-grid{grid-template-columns:1fr;}.opt{min-width:0;}}
</style>
</head>
<body>

const store={
  get(k){try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}},

  del(k){try{localStorage.removeItem(k);}catch(e){delete mem[k];}}

let S=load();

function freshWine(){return{label:'',appearance:0,aroma:0,palate:0,finish:0,overall:0,
  varietal:'',vintage:'',region:'',price:'',
  gVarietal:null,gVintage:null,gRegion:null,
  aVarietal:'',aVintage:'',aRegion:'',aPrice:''};}
function freshState(){return{stage:'title',name:'',numWines:6,wines:[],cur:0,scoreCur:0,collected:[]};}
function load(){const raw=store.get(STORE_KEY);if(raw){try{const s=JSON.parse(raw);if(!s.collected)s.collected=[];return s;}catch(e){}}return freshState();}
function save(){store.set(STORE_KEY,JSON.stringify(S));}

const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function ratingTotal(w){return RATING_CATS.reduce((s,c)=>s+(w[c.key]||0),0);}
function pricePoints(w){
  const g=parseFloat(w.price),a=parseFloat(w.aPrice);
  if(isNaN(g)||isNaN(a))return null;
  const d=Math.abs(g-a);
  return d<=0?10:d<=1?5:d<=5?2:0;
}
function guessTotal(w){return (w.gVarietal||0)+(w.gVintage||0)+(w.gRegion||0)+(pricePoints(w)||0);}
function guessAnswered(w){return w.gVarietal!==null&&w.gVintage!==null&&w.gRegion!==null;}
function wineName(w,i){return(w.label&&w.label.trim())?w.label.trim():'Wine '+(i+1);}

let toastTimer;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1700);}

function glassSVG(total){
  const frac=Math.max(0,Math.min(1,total/25)),top=15,bottom=68,h=bottom-top,liqTop=bottom-frac*h;
  return `<svg class="glass" viewBox="0 0 100 140" aria-hidden="true">
    <defs><clipPath id="bowl"><path d="M25,15 Q25,64 50,68 Q75,64 75,15 Z"/></clipPath>
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c24a66"/><stop offset="1" stop-color="#7b1f38"/></linearGradient></defs>
    <g clip-path="url(#bowl)"><rect x="20" y="${liqTop.toFixed(1)}" width="60" height="${(bottom-liqTop+2).toFixed(1)}" fill="url(#wine)"/>
    ${frac>0?`<ellipse cx="50" cy="${liqTop.toFixed(1)}" rx="25" ry="2.6" fill="#d96a82" opacity=".8"/>`:''}</g>
    <path d="M25,15 Q25,64 50,68 Q75,64 75,15" fill="none" stroke="#f4ede2" stroke-width="2.4" stroke-linecap="round" opacity=".85"/>
    <line x1="25" y1="15" x2="75" y2="15" stroke="#f4ede2" stroke-width="2.4" opacity=".85"/>
    <rect x="48.6" y="68" width="2.8" height="46" fill="#f4ede2" opacity=".75"/>
    <path d="M30,120 Q50,112 70,120" fill="none" stroke="#f4ede2" stroke-width="2.4" stroke-linecap="round" opacity=".75"/></svg>`;
}

/* =================== RENDER =================== */
function render(){
  stopScanner();
  save();
  document.body.classList.toggle('setup-bg',S.stage==='setup');
  document.body.classList.toggle('title-mode',S.stage==='title');
  window.scrollTo({top:0,behavior:'instant'});
  ({title:viewTitle,setup:viewSetup,tasting:viewTasting,checkpoint:viewCheckpoint,scoring:viewScoring,
    results:viewResults,qr:viewQR,scan:viewScan,final:viewFinal}[S.stage]||viewTitle)();
}

  $('app').innerHTML=`

    const optHTML=opts.map(o=>`<button class="opt ${cur===o.p?'on':''}" data-q="${qk}" data-p="${o.p}">${esc(o.t)}<b>${o.p}</b></button>`).join('');

  const pp=pricePoints(w);

  </div>`;

  const isLast=i===S.wines.length-1;
  $('app').innerHTML=mast(true)+railHTML(i)+`
    <div class="card flush">
      <div class="card-tag">Stage 2 · Grade yourself</div>
      <h2>Wine ${i+1} <span style="color:var(--sand-dim);font-size:16px;font-weight:400;font-family:'Outfit'">of ${S.wines.length}</span></h2>
      <p class="lede">As each wine is revealed, grade how close your guesses were. Be honest — it's for bragging rights.</p>
      <label class="fld"><span class="lbl">Name this wine (optional)</span>
        <input type="text" id="labelIn" placeholder="e.g. The Ridge Zin" value="${esc(w.label)}" autocomplete="off"/></label>
      <div style="margin-top:6px;">${blocks}</div>
      <div class="total-block" style="margin-top:16px;"><div class="total-meta">
        <div class="k">Guess score · this wine</div>
        <div class="v"><span id="guessRun">${guessTotal(w)}</span><small> / ${MAX_GUESS_PER_WINE}</small></div></div></div>
    </div>
    <div class="btn-row">
      ${i>0?`<button class="btn btn-ghost" id="prev">← Wine ${i}</button>`:''}
      <button class="btn btn-primary" id="next">${isLast?'See final results →':'Next wine →'}</button>
    </div>
    <button class="reset-link" id="reset">Start over</button>`;

  $('labelIn').oninput=e=>{w.label=e.target.value;save();};
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    const gkey=GKEY[b.dataset.q],p=+b.dataset.p;
    w[gkey]=(w[gkey]===p)?null:p; save(); refreshGrading(w);
  });
  document.querySelectorAll('[data-a]').forEach(inp=>inp.oninput=e=>{w[e.target.dataset.a]=e.target.value;save();});
  $('actualPrice').oninput=e=>{w.aPrice=e.target.value;save();refreshGrading(w);};
  if($('prev'))$('prev').onclick=()=>{S.scoreCur--;render();};
  $('next').onclick=()=>{
    if(!guessAnswered(w)){toast('Grade varietal, vintage & region first');return;}
    if(isLast){S.stage='results';render();}else{S.scoreCur++;render();}
  };
  $('reset').onclick=confirmReset;
}
function priceNote(w){
  const g=parseFloat(w.price),a=parseFloat(w.aPrice);
  if(isNaN(g))return 'No price guessed → 0 pts';
  if(isNaN(a))return 'Enter the actual price to score it';
  const d=Math.abs(g-a),pts=pricePoints(w);
  return `Off by <b>$${(Math.round(d*100)/100)}</b> → <b>${pts} pts</b>`;
}
function refreshGrading(w){
  ['varietal','vintage','region'].forEach(qk=>{
    const gkey=GKEY[qk];
    document.querySelectorAll(`.opt[data-q="${qk}"]`).forEach(b=>b.classList.toggle('on',w[gkey]===+b.dataset.p));
    const pe=$('pts-'+qk);if(pe)pe.textContent=(w[gkey]!==null?w[gkey]:'–')+'/5';
  });
  const pp=pricePoints(w),ppe=$('pts-price');if(ppe)ppe.textContent=(pp===null?'–':pp)+'/10';
  const pn=$('priceNote');if(pn)pn.innerHTML=priceNote(w);
  const gr=$('guessRun');if(gr)gr.textContent=guessTotal(w);
}

let scanStream=null,scanRAF=null,lastScanData='',lastScanTime=0;
function stopScanner(){

async function startScanner(){
  const v=$('video');
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=scanStream;await v.play();
    $('startover').style.display='none';$('guide').style.display='block';
    $('status').textContent='Point at a QR code…';
    const cv=document.createElement('canvas'),ctx=cv.getContext('2d',{willReadFrequently:true});
    const tick=()=>{
      if(v.readyState===v.HAVE_ENOUGH_DATA){
        cv.width=v.videoWidth;cv.height=v.videoHeight;
        ctx.drawImage(v,0,0,cv.width,cv.height);
        try{
          const d=ctx.getImageData(0,0,cv.width,cv.height);
          const code=jsQR(d.data,d.width,d.height,{inversionAttempts:'dontInvert'});
          if(code&&code.data)handleScan(code.data);
        }catch(e){}
      }
      scanRAF=requestAnimationFrame(tick);
    };
    scanRAF=requestAnimationFrame(tick);
  }catch(e){
    $('status').textContent='Camera blocked — allow access or add scores by hand.';
  }
}
function handleScan(data){
  const now=Date.now();
  if(data===lastScanData&&now-lastScanTime<2500)return;
  let card;try{card=JSON.parse(data);}catch(e){return;}
  if(!card||card.v!=='aptos26'||!card.n)return;
  lastScanData=data;lastScanTime=now;
  const num=v=>(typeof v==='number'?v:null);
  const added=upsertCard({v:'aptos26',n:String(card.n).slice(0,28),w:num(card.w),
    p:+card.p||0,g:num(card.g),m:num(card.m),t:num(card.t),
    sv:num(card.sv),sy:num(card.sy),sr:num(card.sr),sp:num(card.sp),
    d:Array.isArray(card.d)?card.d:null});
  renderTally();
  if(navigator.vibrate)navigator.vibrate(60);
  toast((added?'Added ':'Updated ')+card.n+' · '+(+card.p||0)+'%');
  $('status').textContent='Got '+card.n+' — scan the next person';
}
function upsertCard(card,silent){
  const k=card.n.trim().toLowerCase();
  const idx=S.collected.findIndex(x=>x.n.trim().toLowerCase()===k);
  let added=true;
  if(idx>=0){const self=S.collected[idx]._self;S.collected[idx]={...card,_self:self||card._self};added=false;}
  else S.collected.push(card);
  save();return added;
}
function removeCard(name){
  S.collected=S.collected.filter(x=>x.n!==name);save();renderTally();
}
function sortedCollected(){return [...S.collected].sort((a,b)=>(b.p||0)-(a.p||0));}
function renderTally(){
  const el=$('tally');if(!el)return;
  const list=sortedCollected();
  if(!list.length){el.innerHTML=`<div class="tally-empty">No scores yet. Scan a code or add one by hand.</div>`;return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=list.map((c,i)=>{
    const medal=medals[i]||`<span style="font-family:Fraunces;color:var(--sand-dim)">${i+1}</span>`;
    const sub=c.g!=null&&c.m!=null?`${c.g}/${c.m} pts`:(c.manual?'added by hand':' ');
    return `<div class="tally-row"><div class="medal">${medal}</div>
      <div class="nm">${esc(c.n)}${c._self?' <span style="color:var(--teal);font-size:11px;">(you)</span>':''}<small>${sub}</small></div>
      <div class="pc">${c.p||0}%</div>
      <button class="rx" data-rm="${esc(c.n)}" aria-label="Remove">✕</button></div>`;
  }).join('');
  el.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>removeCard(b.dataset.rm));
}

/* ---------- share leaderboard + awards as an image ---------- */
function drawTallyImage(){
  const list=sortedCollected(),awards=computeAwards(list),wines=wineRanking(list);
  const dpr=2,W=820,pad=44,rowH=78,headH=210,footH=64;
  const awardLines=AWARDS.filter(a=>awards[a.key]);
  const awardsBlock=awardLines.length?(64+awardLines.length*58+18):0;
  const wineBlock=wines.length?(64+wines.length*58+18):0;
  const H=headH+Math.max(1,list.length)*rowH+awardsBlock+wineBlock+footH;
  const cv=document.createElement('canvas');cv.width=W*dpr;cv.height=H*dpr;
  const x=cv.getContext('2d');x.scale(dpr,dpr);
  const grad=x.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#2c1636');grad.addColorStop(1,'#170a1d');
  x.fillStyle=grad;x.fillRect(0,0,W,H);
  /* header */
  x.textAlign='center';
  x.fillStyle='#e8b04b';x.font='600 22px Outfit, sans-serif';
  x.fillText('ANNUAL BEACH TASTING · MONTEREY BAY',W/2,62);
  x.fillStyle='#f4ede2';x.font='600 64px Fraunces, Georgia, serif';
  x.fillText('Aptos 2026',W/2,128);
  x.fillStyle='#cdbfb8';x.font='400 24px Outfit, sans-serif';
  x.fillText('Blind Tasting · Final Scores',W/2,168);
  x.strokeStyle='rgba(244,237,226,.18)';x.lineWidth=1;x.beginPath();x.moveTo(pad,headH-22);x.lineTo(W-pad,headH-22);x.stroke();
  /* standings */
  const medals=['🥇','🥈','🥉'];
  x.textAlign='left';
  list.forEach((c,i)=>{
    const y=headH+i*rowH;
    if(i%2===0){x.fillStyle='rgba(244,237,226,.04)';x.fillRect(pad-14,y-6,W-2*(pad-14),rowH-12);}
    if(i===0){x.fillStyle='rgba(232,176,75,.12)';x.fillRect(pad-14,y-6,W-2*(pad-14),rowH-12);}
    x.fillStyle='#f4ede2';x.font='600 34px Fraunces, serif';
    x.fillText(medals[i]||String(i+1),pad,y+rowH/2+4);
    x.fillStyle='#f4ede2';x.font='600 30px Outfit, sans-serif';
    x.fillText(c.n+(c._self?'  (you)':''),pad+72,y+rowH/2-2);
    if(c.g!=null&&c.m!=null){x.fillStyle='#cdbfb8';x.font='400 18px Outfit, sans-serif';x.fillText(c.g+'/'+c.m+' pts',pad+72,y+rowH/2+22);}
    x.textAlign='right';x.fillStyle='#e8b04b';x.font='600 40px Fraunces, serif';
    x.fillText((c.p||0)+'%',W-pad,y+rowH/2+8);x.textAlign='left';
  });
  let ay=headH+list.length*rowH+20;
  /* category awards */
  if(awardLines.length){
    x.strokeStyle='rgba(244,237,226,.18)';x.beginPath();x.moveTo(pad,ay);x.lineTo(W-pad,ay);x.stroke();
    ay+=42;
    x.textAlign='left';x.fillStyle='#e8b04b';x.font='600 20px Outfit, sans-serif';
    x.fillText('CATEGORY AWARDS',pad,ay);ay+=14;
    awardLines.forEach(a=>{
      const w=awards[a.key];ay+=46;
      x.font='28px Outfit, sans-serif';x.fillStyle='#f4ede2';x.fillText(a.icon,pad,ay+2);
      x.font='600 24px Outfit, sans-serif';x.fillStyle='#cdbfb8';x.fillText(a.label,pad+44,ay-6);
      x.font='600 26px Outfit, sans-serif';x.fillStyle='#f4ede2';x.fillText(w.names,pad+44,ay+22);
      x.textAlign='right';x.font='600 26px Fraunces, serif';x.fillStyle='#e8b04b';
      x.fillText(w.val+'/'+w.max,W-pad,ay+8);x.textAlign='left';ay+=12;
    });
    ay+=18;
  }
  /* wines, best to worst */
  if(wines.length){
    x.strokeStyle='rgba(244,237,226,.18)';x.beginPath();x.moveTo(pad,ay);x.lineTo(W-pad,ay);x.stroke();
    ay+=42;
    x.textAlign='left';x.fillStyle='#e8b04b';x.font='600 20px Outfit, sans-serif';
    x.fillText('WINES · BEST TO WORST',pad,ay);ay+=14;
    wines.forEach((wr,i)=>{
      ay+=46;
      x.font='600 30px Fraunces, serif';x.fillStyle='#f4ede2';x.fillText(medals[i]||String(i+1),pad,ay+6);
      x.font='600 26px Outfit, sans-serif';x.fillStyle='#f4ede2';x.fillText('Wine '+(wr.i+1),pad+56,ay-4);
      x.font='400 17px Outfit, sans-serif';x.fillStyle='#cdbfb8';x.fillText('avg '+wr.avg.toFixed(1)+'/25 · '+wr.count+' tasters',pad+56,ay+18);
      x.textAlign='right';x.font='600 28px Fraunces, serif';x.fillStyle='#e8b04b';
      x.fillText(wr.total+' pts',W-pad,ay+6);x.textAlign='left';ay+=12;
    });
  }
  /* footer */
  x.textAlign='center';x.fillStyle='#8a7a82';x.font='400 18px Outfit, sans-serif';
  x.fillText('Accuracy = guess closeness · Wine points = combined tasting scores 🍷',W/2,H-26);
  return cv;
}
async function shareTallyImage(){
  if(!S.collected.length){toast('No scores to share yet');return;}
  const cv=drawTallyImage();
  cv.toBlob(async blob=>{
    if(!blob){toast('Could not build image');return;}
    const file=new File([blob],'aptos-2026-scores.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'Aptos 2026 Wine Tasting',text:'Final scores 🍷'});return;}catch(e){}
    }
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aptos-2026-scores.png';
    document.body.appendChild(a);a.click();a.remove();
    toast('Image saved to your device');
  },'image/png');
}

/* ---------- 8. FINAL RESULTS (group) ---------- */
function computeAwards(list){
  const out={};
  AWARDS.forEach(a=>{
    const elig=list.filter(c=>typeof c[a.key]==='number'&&(c.w||0)>0);
    if(!elig.length){out[a.key]=null;return;}
    const max=Math.max(...elig.map(c=>c[a.key]));
    const winners=elig.filter(c=>c[a.key]===max);
    out[a.key]={names:winners.map(c=>c.n).slice(0,3).join(' & '),val:max,max:winners[0].w*a.per};
  });
  return out;
}
/* Rank the wines themselves by everyone's combined tasting scores (row[5] = /25) */
function wineRanking(list){
  const withD=list.filter(c=>Array.isArray(c.d)&&c.d.length);
  if(!withD.length)return [];
  const maxW=Math.max(...withD.map(c=>c.d.length));
  const wines=[];
  for(let i=0;i<maxW;i++){
    let total=0,count=0;
    withD.forEach(c=>{const row=c.d[i];if(row&&typeof row[5]==='number'){total+=row[5];count++;}});
    if(count)wines.push({i,total,count,avg:total/count});
  }
  return wines.sort((a,b)=>b.total-a.total||b.avg-a.avg);
}
function detailRows(c){
  if(!Array.isArray(c.d)||!c.d.length)
    return `<div class="pd-empty">No per-wine detail (added by hand or older code).</div>`;
  return c.d.map((row,wi)=>{
    const vr=row[0]||'—',vn=row[1]||'—',rg=row[2]||'—',pr=row[3]?('$'+row[3]):'—',pts=row[4];
    return `<div class="pd-row"><span class="pd-w">Wine ${wi+1}</span>
      <span class="pd-g">${esc(vr)} · ${esc(vn)} · ${esc(rg)} · ${esc(pr)}</span>
      <span class="pd-p">${pts!=null?pts+' pts':''}</span></div>`;
  }).join('');
}
function viewFinal(){
  const list=sortedCollected(),champ=list[0],awards=computeAwards(list);
  const medals=['🥇','🥈','🥉'];
  const rows=list.map((c,i)=>{
    const medal=medals[i]||`<span style="font-family:Fraunces;color:var(--sand-dim)">${i+1}</span>`;
    const sub=c.g!=null&&c.m!=null?`${c.g}/${c.m} pts`:(c.manual?'added by hand':'');
    return `<div class="presult">
      <button class="presult-head" data-toggle="${i}">
        <div class="medal">${medal}</div>
        <div class="rname">${esc(c.n)}${c._self?' <span style="color:var(--teal);font-size:11px;">(you)</span>':''}<small>${sub}</small></div>
        <div class="rscore">${c.p||0}<small>%</small></div>
        <div class="chev" id="chev-${i}">▾</div>
      </button>
      <div class="presult-detail" id="det-${i}" hidden>${detailRows(c)}</div>
    </div>`;
  }).join('');
  const awardHTML=AWARDS.map(a=>{
    const w=awards[a.key];
    const body=w?`<div class="aw-win">${esc(w.names)} <small>${w.val}/${w.max}</small></div>`
               :`<div class="aw-win muted">Needs a scanned QR code</div>`;
    return `<div class="award"><div class="aw-ico">${a.icon}</div>
      <div class="aw-meta"><div class="aw-label">${a.label} · ${a.blurb}</div>${body}</div></div>`;
  }).join('');
  const wines=wineRanking(list);
  const wineRankHTML=wines.map((wr,idx)=>{
    const medal=medals[idx]||`<span style="font-family:Fraunces;color:var(--sand-dim)">${idx+1}</span>`;
    return `<div class="rank ${idx===0?'gold':''}"><div class="medal">${medal}</div>
      <div class="rname">Wine ${wr.i+1}<small>avg ${wr.avg.toFixed(1)}/25 · ${wr.count} taster${wr.count!==1?'s':''}</small></div>
      <div class="rscore">${wr.total}<small>pts</small></div></div>`;
  }).join('');

  $('app').innerHTML=mast(false)+`
    <div class="card">
      <div class="card-tag">The verdict</div>
      <h2>Final results</h2>
      ${champ?`<div class="champ"><div class="champ-ico">🏆</div>
          <div><div class="champ-k">Overall champion</div>
          <div class="champ-n">${esc(champ.n)}</div>
          <div class="champ-s">${champ.p||0}% accuracy${champ.g!=null&&champ.m!=null?` · ${champ.g}/${champ.m} pts`:''}</div></div></div>`
        :`<p class="lede">No scores collected yet — scan some QR codes first.</p>`}
    </div>
    ${list.length?`<div class="card"><div class="card-tag">Standings</div><h2>Everyone, ranked</h2>
      <p class="lede">Tap a name to see what they guessed.</p><div>${rows}</div></div>`:''}
    ${list.length?`<div class="card"><div class="card-tag">Category awards</div><h2>Who won what</h2><div class="awards">${awardHTML}</div></div>`:''}
    ${wines.length?`<div class="card"><div class="card-tag">Crowd favorites</div><h2>Wines, best to worst</h2>
      <p class="lede">Ranked by everyone's combined tasting scores out of 25.</p>${wineRankHTML}</div>`:''}
    <div class="btn-row">
      <button class="btn btn-gold" id="shareImg">Share results image</button>
      <button class="btn btn-ghost" id="more">← Scan more</button>
    </div>
    <button class="reset-link" id="back">Back to my results</button>`;
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
    const i=b.dataset.toggle,det=$('det-'+i),chev=$('chev-'+i);
    const open=det.hasAttribute('hidden');
    if(open){det.removeAttribute('hidden');chev.classList.add('open');}
    else{det.setAttribute('hidden','');chev.classList.remove('open');}
  });
  $('shareImg').onclick=shareTallyImage;
  $('more').onclick=()=>{S.stage='scan';render();};
  $('back').onclick=()=>{S.stage='results';render();};
}

/* ---------- reset ---------- */
function confirmReset(){
  if(confirm('Clear this tasting and start fresh? This erases your scores on this device.')){
    store.del(STORE_KEY);S=freshState();render();
  }
}

render();
</script>
